name: Deploy KEK Demo (Cloud Staging)

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:
    inputs:
      deploy_staging:
        description: "Deploy to cloud-native staging (demo)"
        required: false
        default: "false"
      demo_mode:
        description: "Run API without database (faster presentation mode)"
        required: false
        default: "true"

env:
  REGISTRY: ghcr.io
  WEB_IMAGE: ghcr.io/${{ github.repository }}/kek-web
  API_IMAGE: ghcr.io/${{ github.repository }}/kek-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest

      - name: Build & push Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest

  deploy-to-staging:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_staging == 'true' }}

    steps:
      - name: Deploy via SSH (demo)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -e
            API_IMAGE="${{ env.API_IMAGE }}:${{ github.sha }}"
            WEB_IMAGE="${{ env.WEB_IMAGE }}:${{ github.sha }}"
            DEMO_MODE="${{ github.event.inputs.demo_mode }}"

            if [ "$DEMO_MODE" = "true" ]; then
              DATABASE_URL=""
            else
              DATABASE_URL="${{ secrets.DATABASE_URL }}"
            fi

            docker pull "$API_IMAGE"
            docker pull "$WEB_IMAGE"

            docker rm -f kek-api || true
            docker rm -f kek-web || true

            docker run -d --name kek-api \
              -e PORT=4000 \
              -e DATABASE_URL="$DATABASE_URL" \
              -e WEB_BASE_URL='${{ secrets.WEB_BASE_URL }}' \
              -e WHATSAPP_NUMBER='${{ secrets.WHATSAPP_NUMBER }}' \
              -p 4000:4000 \
              "$API_IMAGE"

            docker run -d --name kek-web \
              -e NEXTAUTH_URL='${{ secrets.NEXTAUTH_URL }}' \
              -e NEXTAUTH_SECRET='${{ secrets.NEXTAUTH_SECRET }}' \
              -e NEXT_PUBLIC_API_URL='${{ secrets.NEXT_PUBLIC_API_URL }}' \
              -p 3000:3000 \
              "$WEB_IMAGE"

