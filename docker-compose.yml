services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: kek_demo
    ports:
      - "5432:5432"
    volumes:
      - kek_pg_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      PORT: "4000"
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/kek_demo?schema=public"
      WEB_BASE_URL: "http://localhost:3000"
      WHATSAPP_NUMBER: "233201234567"
    ports:
      - "4000:4000"
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "replace-me-in-staging"
      NEXT_PUBLIC_API_URL: "http://localhost:4000"
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  kek_pg_data:

